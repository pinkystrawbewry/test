<!DOCTYPE html>
<html lang="id">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Excel Learning Assistant 2021</title>
    <meta name="description" content="Aplikasi belajar Excel interaktif dengan asisten rumus dan mode tantangan.">
    <meta name="theme-color" content="#1F7244">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./assets/icon-192.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/style.css">

                <div class="d-flex align-center gap-2">

                <div class="d-flex align-center justify-between" style="height: 100%; display: flex; align-items:center; justify-content:center;">
                    <div class="text-center">
                        <h2 class="text-muted">Loading...</h2>
                    </div>
                </div>

            <!-- Bottom Navigation (Mobile) -->
            <nav id="bottom-nav">

                    Challenge
                </a>
            </nav>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container"></div>

    <!-- Scripts -->
    <script src="./js/storage.js"></script>
    <script src="./js/logic.js"></script>
    <script src="./js/router.js"></script>
    <script src="./js/app.js"></script>
